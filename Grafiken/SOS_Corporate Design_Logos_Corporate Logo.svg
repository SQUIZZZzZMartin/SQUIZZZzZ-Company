  <text class="st12" transform="translate(29.06 134.38)"><tspan x="0" y="0">Das Corporate Logo ist die reduzierte Wortmarke von </tspan><tspan x="0" y="10.8">SQUIZZZzZ und dient der Unternehmenskommunikation </tspan><tspan x="0" y="21.6">sowie der internen Dokumentation.</tspan><tspan x="0" y="43.2">Es basiert ausschließlich auf Typografie und verzichtet </tspan><tspan x="0" y="54">bewusst auf plastische Effekte. Dadurch entsteht ein ruhiger, </tspan><tspan x="0" y="64.8">zeitloser und konsistenter Unternehmensauftritt.</tspan><tspan x="0" y="86.4">Verwendet wird </tspan><tspan x="0" y="108">• Avenir Black</tspan><tspan x="0" y="118.8">• mit einem Zeichenabstand von -10</tspan><tspan x="0" y="140.4">Die Farbaufteilung folgt der verbindlichen Markenidentität:</tspan><tspan x="0" y="151.2">• S</tspan><tspan class="st17" x="12.01" y="151.2">	</tspan><tspan x="36" y="151.2">SQUIZZZzZ Blau</tspan><tspan x="0" y="162">• QUIZ</tspan><tspan class="st16" x="28.06" y="162">	</tspan><tspan x="36" y="162">SQUIZZZzZ Orange</tspan><tspan x="0" y="172.8">• ZZzZ</tspan><tspan class="st15" x="25.85" y="172.8">	</tspan><tspan x="36" y="172.8">SQUIZZZzZ Blau</tspan><tspan x="0" y="194.4">Schatten, Verläufe, Konturen, Verzerrungen oder sonstige </tspan><tspan x="0" y="205.2">dekorative Effekte sind nicht zulässig.</tspan></text>
