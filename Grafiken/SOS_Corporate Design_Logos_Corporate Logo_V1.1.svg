  <text class="st13" transform="translate(29.06 134.38)"><tspan x="0" y="0">Das Corporate Logo ist die reduzierte Wortmarke von </tspan><tspan x="0" y="10.8">SQUIZZZzZ und dient der Unternehmenskommunikation </tspan><tspan x="0" y="21.6">sowie der internen Dokumentation.</tspan><tspan x="0" y="43.2">Es basiert ausschließlich auf Typografie und verzichtet </tspan><tspan x="0" y="54">bewusst auf plastische Effekte. Dadurch entsteht ein ruhiger, </tspan><tspan x="0" y="64.8">zeitloser und konsistenter Unternehmensauftritt.</tspan><tspan x="0" y="86.4">Verwendet wird </tspan><tspan x="0" y="108">• Avenir Black</tspan><tspan x="0" y="118.8">• mit einem Zeichenabstand:</tspan><tspan class="st26" x="0" y="129.6">	</tspan><tspan x="36" y="129.6">SQU</tspan><tspan class="st18" x="54.68" y="129.6">	</tspan><tspan x="72" y="129.6">von </tspan><tspan class="st19" x="89.18" y="129.6">	</tspan><tspan x="108" y="129.6">-50</tspan><tspan class="st26" x="0" y="140.4">	</tspan><tspan x="36" y="140.4">IZZZzZ</tspan><tspan class="st20" x="62.23" y="140.4">	</tspan><tspan x="72" y="140.4">von</tspan><tspan class="st28" x="86.68" y="140.4">	</tspan><tspan x="108" y="140.4">-10</tspan><tspan x="0" y="162">Die Farbaufteilung folgt der verbindlichen Markenidentität:</tspan><tspan x="0" y="172.8">• S</tspan><tspan class="st27" x="12.01" y="172.8">	</tspan><tspan x="36" y="172.8">SQUIZZZzZ Blau</tspan><tspan x="0" y="183.6">• QUIZ</tspan><tspan class="st22" x="28.06" y="183.6">	</tspan><tspan x="36" y="183.6">SQUIZZZzZ Orange</tspan><tspan x="0" y="194.4">• ZZzZ</tspan><tspan class="st21" x="25.85" y="194.4">	</tspan><tspan x="36" y="194.4">SQUIZZZzZ Blau</tspan><tspan x="0" y="216">Schatten, Verläufe, Konturen, Verzerrungen oder sonstige </tspan><tspan x="0" y="226.8">dekorative Effekte sind nicht zulässig.</tspan></text>
