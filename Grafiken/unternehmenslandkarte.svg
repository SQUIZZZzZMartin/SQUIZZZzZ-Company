<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #121889; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #555; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #111; }
      .box-sub { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #333; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #555; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #0B106C; }
      .line { stroke: #1921B1; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #008A47; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); stroke-dasharray: 8 8; }
      .box { rx: 22; ry: 22; stroke-width: 3; }
      .shadow { filter: url(#dropShadow); }
    </style>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1921B1" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#008A47" />
    </marker>
  </defs>

  <rect width="1400" height="950" fill="#fffaf2"/>
  <text x="70" y="70" class="title">SQUIZZZzZ Unternehmenslandkarte</text>
  <text x="70" y="102" class="subtitle">Version 1.0 · Unternehmensmodell für das SQUIZZZzZ Operating System</text>

  <!-- Martin -->
  <rect x="530" y="135" width="340" height="92" class="box shadow" fill="#ff8e00" stroke="#c96f00"/>
  <text x="700" y="174" text-anchor="middle" class="box-title" fill="#fff">Martin</text>
  <text x="700" y="202" text-anchor="middle" class="box-sub" fill="#fff">Eigentümer · Geschäftsführer · Freigabe</text>

  <!-- Level 2 -->
  <rect x="90" y="330" width="310" height="110" class="box shadow" fill="#fff" stroke="#ff8e00"/>
  <text x="245" y="372" text-anchor="middle" class="box-title">Orange Codex</text>
  <text x="245" y="402" text-anchor="middle" class="box-sub">Identität · Werte · Governance</text>

  <rect x="545" y="330" width="310" height="110" class="box shadow" fill="#fff" stroke="#1921B1"/>
  <text x="700" y="372" text-anchor="middle" class="box-title">SOS</text>
  <text x="700" y="402" text-anchor="middle" class="box-sub">Ressourcen · Tools · Prozesse</text>

  <rect x="1000" y="330" width="310" height="110" class="box shadow" fill="#fff" stroke="#00B25C"/>
  <text x="1155" y="372" text-anchor="middle" class="box-title">SQUIZZZzZ Knowledge</text>
  <text x="1155" y="402" text-anchor="middle" class="box-sub">Regeln · Erkenntnisse · ADRs</text>

  <!-- Academy independent -->
  <rect x="960" y="135" width="310" height="92" class="box shadow" fill="#fff" stroke="#008A47"/>
  <text x="1115" y="174" text-anchor="middle" class="box-title">Academy</text>
  <text x="1115" y="202" text-anchor="middle" class="box-sub">Martins persönlicher Lernpfad</text>

  <!-- Level 3 -->
  <rect x="455" y="565" width="490" height="118" class="box shadow" fill="#fff" stroke="#121889"/>
  <text x="700" y="609" text-anchor="middle" class="box-title">SQUIZZZzZ Welt</text>
  <text x="700" y="639" text-anchor="middle" class="box-sub">Erlebnisuniversum · Formate · Figuren · Regeln</text>
  <text x="700" y="664" text-anchor="middle" class="small">Das dauerhaft gültige Produktmodell</text>

  <!-- Level 4 -->
  <rect x="495" y="795" width="410" height="95" class="box shadow" fill="#fff" stroke="#ff8e00"/>
  <text x="700" y="835" text-anchor="middle" class="box-title">Projekte / Events</text>
  <text x="700" y="864" text-anchor="middle" class="box-sub">z. B. Smakfullt! · konkrete Umsetzung</text>

  <!-- Connections -->
  <path d="M700 227 L700 285 L245 285 L245 330" class="line"/>
  <path d="M700 227 L700 330" class="line"/>
  <path d="M700 227 L700 285 L1155 285 L1155 330" class="line"/>
  <path d="M870 181 L960 181" class="line-soft"/>
  <text x="912" y="166" text-anchor="middle" class="label">lernt</text>

  <path d="M245 440 L245 520 L635 520 L635 565" class="line"/>
  <path d="M700 440 L700 565" class="line"/>
  <path d="M1155 440 L1155 520 L765 520 L765 565" class="line"/>

  <path d="M700 683 L700 795" class="line"/>

  <!-- Feedback loop -->
  <path d="M905 845 C1225 845 1280 700 1280 445" class="line-soft"/>
  <text x="1200" y="805" class="label">Erkenntnisse fließen zurück</text>

  <path d="M1000 386 C910 485 830 525 760 565" class="line-soft"/>

  <!-- Legend -->
  <rect x="70" y="805" width="330" height="85" rx="18" ry="18" fill="#ffffff" stroke="#ddd"/>
  <circle cx="95" cy="833" r="8" fill="#1921B1"/>
  <text x="115" y="838" class="small">Struktur- und Arbeitsfluss</text>
  <circle cx="95" cy="863" r="8" fill="#008A47"/>
  <text x="115" y="868" class="small">Lern- und Rückkopplungsfluss</text>
</svg>
